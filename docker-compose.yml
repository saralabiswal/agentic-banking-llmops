name: banking-agentic-ai-platform

services:

  # ── Valkey (Redis-compatible, open source) ──────────────────────────────────
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: bap-valkey
    ports:
      - "6379:6379"
    command: valkey-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - platform

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bap-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - platform

  # ── Qdrant (vector store) ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: bap-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333; printf "GET / HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3; IFS= read -r line <&3; [[ "$$line" == *"200 OK"* ]]'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - platform

  # ── Jaeger (distributed tracing) ───────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: bap-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC (OpenTelemetry collector)
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform

  # ── Prometheus (metrics collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: bap-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - platform

  # ── Grafana (dashboards) ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: bap-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - platform

  # ── MLflow (model registry + experiment tracking) ───────────────────────────
  # NOTE: Uses SQLite backend for local dev — no psycopg2 dependency.
  # Production: swap --backend-store-uri to postgresql://... and install
  # psycopg2 via a custom image or pip install in the command.
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: bap-mlflow
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - platform

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  platform:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  mlflow_data:
